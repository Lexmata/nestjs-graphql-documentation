name: Feature request
description: Propose a new capability or an extension to an existing one.
title: 'feat: '
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to accomplish that's currently awkward or impossible?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the API you'd expect. A public-API sketch works great.
      render: ts
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you look at? Why didn't it fit?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      multiple: true
      options:
        - Harvester / docs model
        - Renderer / HTML output
        - Client JS / UX
        - Module configuration
        - Documentation
        - Other
    validations:
      required: true
